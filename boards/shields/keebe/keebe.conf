# This file was generated from a template. Edit it to match your keyboard.
# See https://zmk.dev/docs/development/hardware-integration/new-shield for more
# instructions.

# This file will be copied into the user's config directory when they add this
# keyboard. Define any Kconfig options users may frequently want to set here,
# but leave them commented out, for example:

# Uncomment to enable the encoder
# CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Uncomment to enable the display
# CONFIG_ZMK_DISPLAY=y

# ---------

# ZMK Studio Support
# CONFIG_ZMK_STUDIO=y

# Bluetooth Power Increase (Helps with connection stability)
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Experimental BLE features for better Windows/Laptop compatibility
CONFIG_ZMK_BLE_EXPERIMENTAL_FEATURES=y
# Enable RGB Underglow
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y
# Cap the maximum brightness (e.g., 40%) to prevent dangerous power spikes
CONFIG_ZMK_RGB_UNDERGLOW_BRT_MAX=40
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=10

# Highly Recommended: Automatically turn off LEDs when disconnected from USB.
# This prevents the LEDs from instantly draining/damaging your LiPo battery.
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_USB=y

# Turn off LEDs when the keyboard goes idle
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y

# Allows the nice!nano to use the EXT_VCC pin to completely cut power
# to the LEDs, stopping their passive idle drain.
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=y